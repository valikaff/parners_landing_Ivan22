<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Коробочка с бантом -->
  <rect x="20" y="35" width="60" height="50" fill="#2567df" rx="3"/>
  <rect x="20" y="35" width="60" height="15" fill="#1e52b8"/>
  
  <!-- Бант сверху -->
  <ellipse cx="30" cy="50" rx="8" ry="12" fill="#ff6b6b"/>
  <ellipse cx="70" cy="50" rx="8" ry="12" fill="#ff6b6b"/>
  <rect x="28" y="48" width="44" height="4" fill="#ff6b6b"/>
  
  <!-- Центральная часть банта -->
  <circle cx="50" cy="50" r="6" fill="#ff4757"/>
  <rect x="47" y="44" width="6" height="12" fill="#ff4757"/>
  
  <!-- Блеск/отражение -->
  <ellipse cx="35" cy="42" rx="8" ry="5" fill="rgba(255,255,255,0.3)"/>
</svg>

